<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Maryam ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
overflow:hidden;
}

.container{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
max-width:700px;
padding:35px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,.3);
text-align:center;
}

h1{
color:#764ba2;
margin-bottom:20px;
}

#message{
text-align:left;
line-height:1.8;
font-size:16px;
white-space:pre-line;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#764ba2;
color:white;
font-size:16px;
cursor:pointer;
margin-bottom:20px;
}

button:hover{
opacity:.9;
}

.signature{
margin-top:25px;
font-weight:bold;
font-size:18px;
color:#764ba2;
}

.heart{
position:absolute;
color:#ff8fb1;
animation:float 8s linear infinite;
font-size:24px;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>💌 To Maryam</h1>

<button onclick="showLetter()">Open Letter ❤️</button>

<div id="message"></div>

<div class="signature">
From Noman ❤️
</div>

</div>
</div>

<script>

// Floating Hearts
for(let i=0;i<35;i++){
let heart=document.createElement('div');
heart.className='heart';
heart.innerHTML='❤️';
heart.style.left=Math.random()*100+'%';
heart.style.animationDelay=Math.random()*8+'s';
document.body.appendChild(heart);
}

const text=`Main shayad perfect person nahi hoon, but one thing I know for sure is that my heart has never been this sure about anyone before.

Tumhari entry meri life mein bilkul unexpected thi, but ab lagta hai jaise tum hamesha se meri story ka part the.

Tumse baat kiye bina din adhura lagta hai, aur tumhari ek choti si attention bhi mood instantly better kar deti hai.

Kuch log sirf life mein aate hain, aur kuch log life ban jaate hain. Tum mere liye wahi ho.

Tumhare saath silence bhi comfortable lagta hai, random talks bhi meaningful lagti hain aur ordinary moments bhi memories ban jaate hain.

Mujhe tumhare saath flashy love nahi chahiye, bas woh simple sa forever chahiye — late night talks, stupid jokes, unnecessary arguments aur har mushkil waqt mein saath.

Aur agar life mujhe dobara sab kuch choose karne ka chance de, toh main har baar tumhari smile, tumhara heart aur tumhari presence hi choose karunga.

Every. Single. Time. ❤️`;

function showLetter(){

let i=0;
let target=document.getElementById('message');
target.innerHTML='';

let typing=setInterval(()=>{
target.innerHTML += text.charAt(i);
i++;

if(i>=text.length){
clearInterval(typing);
}

},30);
}
</script>

</body>
</html>
